{# Quick social auth — Google / Apple / Facebook (icon-only row) #}
{% if messages %}
  {% for message in messages %}
    <p class="auth-banner {% if message.tags %}auth-banner--{{ message.tags }}{% endif %}">{{ message }}</p>
  {% endfor %}
{% endif %}

<div class="social-auth" role="group" aria-label="Quick sign-in options">
  <a
    class="social-btn social-btn--google"
    href="{% url 'accounts:oauth' 'google' %}?next={{ request.path }}"
    aria-label="Continue with Google"
  >
    <svg class="social-btn__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="#EA4335" d="M12 10.2v3.6h5.1c-.2 1.2-.9 2.2-1.9 2.9l3.1 2.4c1.8-1.7 2.8-4.1 2.8-7 0-.7-.1-1.3-.2-1.9H12z"/>
      <path fill="#34A853" d="M5.3 14.3l-.8.6-2.7 2.1C3.5 20.2 7.4 22.5 12 22.5c2.7 0 5-.9 6.7-2.4l-3.1-2.4c-.9.6-2 .9-3.6.9-2.8 0-5.1-1.9-5.9-4.4z"/>
      <path fill="#4A90E2" d="M3.8 7c-.5 1-.8 2.1-.8 3.3s.3 2.3.8 3.3c0 .1 3.5-2.7 3.5-2.7-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9L3.8 7z"/>
      <path fill="#FBBC05" d="M12 5.3c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 2.3 14.7 1.5 12 1.5 7.4 1.5 3.5 3.8 1.8 7l3.5 2.7C6.9 7.2 9.2 5.3 12 5.3z"/>
    </svg>
  </a>
  <a
    class="social-btn social-btn--apple"
    href="{% url 'accounts:oauth' 'apple' %}?next={{ request.path }}"
    aria-label="Continue with Apple"
  >
    <svg class="social-btn__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M16.7 12.6c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3.1-1.6-1.3-.1-2.5.8-3.2.8-.7 0-1.7-.8-2.8-.7-1.4 0-2.8.9-3.5 2.2-1.5 2.6-.4 6.5 1.1 8.6.7 1 1.6 2.2 2.7 2.1 1.1 0 1.5-.7 2.8-.7s1.7.7 2.8.7c1.2 0 1.9-1 2.6-2 .8-1.2 1.1-2.3 1.1-2.4-.1 0-2.2-.8-2.3-3.8zM14.6 6.5c.6-.7 1-1.7.9-2.7-0.9.1-1.9.6-2.5 1.3-.6.6-1.1 1.6-1 2.6 1 .1 1.9-.5 2.6-1.2z"/>
    </svg>
  </a>
  <a
    class="social-btn social-btn--facebook"
    href="{% url 'accounts:oauth' 'facebook' %}?next={{ request.path }}"
    aria-label="Continue with Facebook"
  >
    <svg class="social-btn__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path fill="#1877F2" d="M24 12.1C24 5.4 18.6 0 12 0S0 5.4 0 12.1C0 18.1 4.4 23.1 10.1 24v-8.4H7.1v-3.5h3V9.4c0-3 1.8-4.6 4.5-4.6 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9v2.3h3.4l-.5 3.5h-2.9V24C19.6 23.1 24 18.1 24 12.1z"/>
      <path fill="#fff" d="M16.6 15.6l.5-3.5h-3.4V9.8c0-1 .5-1.9 2-1.9h1.5v-3s-1.4-.2-2.7-.2c-2.7 0-4.5 1.6-4.5 4.6v2.6h-3v3.5h3V24c1.2.2 2.4.2 3.6 0v-8.4h2.9z"/>
    </svg>
  </a>
</div>

<div class="auth-divider" role="separator">
  <span>or continue with email/username</span>
</div>
