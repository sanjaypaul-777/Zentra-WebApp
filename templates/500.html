<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Server error · BrandBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Sora:wght@600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ STATIC_URL }}css/base.css" />
    <link rel="stylesheet" href="{{ STATIC_URL }}css/status.css" />
    <link rel="icon" href="{{ STATIC_URL }}images/favicon.ico?v=3" sizes="any" />
  </head>
  <body>
    <main class="status-page">
      <div class="status-glow status-glow--primary" aria-hidden="true"></div>
      <div class="status-glow status-glow--magenta" aria-hidden="true"></div>
      <div class="status-inner">
        <a href="/" class="status-logo" aria-label="BrandBox">
          <img src="{{ STATIC_URL }}images/logo-mark.png?v=3" alt="" width="48" height="48" />
        </a>
        <div class="status-card">
          <p class="status-code status-code--magenta" aria-hidden="true">500</p>
          <div class="status-icon status-icon--magenta" aria-hidden="true">
            <span class="material-symbols-outlined">warning</span>
          </div>
          <h1>Something went wrong on our end</h1>
          <p class="status-body">
            This isn't something you did — our team's already been notified.
            Try again in a moment.
          </p>
          <div class="status-actions">
            <a class="brandbox-btn brandbox-btn--primary" href="javascript:location.reload()">
              Try again →
            </a>
            <a class="brandbox-btn brandbox-btn--secondary" href="/dashboard/">
              Back to Dashboard
            </a>
          </div>
          <p class="status-ref">Error reference: {{ error_reference }}</p>
        </div>
      </div>
    </main>
  </body>
</html>
