{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BrandBox{% endblock %}</title>
    <meta
      name="description"
      content="Connect your store, pick a niche, and BrandBox loads it with a professional theme and real products — ready to sell today."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    {# display=block + icons-ready gate: no ligature-name flash before icon font loads #}
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="icon" href="{% static 'images/favicon.png' %}?v=5" type="image/png" />
    <link rel="apple-touch-icon" href="{% static 'images/favicon.png' %}?v=5" />
    <script>
      (function () {
        var done = false;
        function ready() {
          if (done) return;
          done = true;
          document.documentElement.classList.add("icons-ready");
        }
        if (document.fonts && document.fonts.load) {
          document.fonts
            .load('24px"Material Symbols Outlined"')
            .then(ready, ready);
          setTimeout(ready, 1500);
        } else {
          ready();
        }
      })();
    </script>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
    {% block extra_js %}{% endblock %}
  </body>
</html>
