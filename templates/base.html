{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BrandBox{% endblock %}</title>
    <meta
      name="description"
      content="Connect your store, pick a niche, and BrandBox loads it with a professional theme and real products — ready to sell today."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/base.css' %}" />
    <link rel="icon" href="{% static 'images/favicon.ico' %}?v=3" sizes="any" />
    <link rel="icon" href="{% static 'images/favicon-32.png' %}?v=3" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="{% static 'images/apple-touch-icon.png' %}?v=3" />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
  </body>
</html>
